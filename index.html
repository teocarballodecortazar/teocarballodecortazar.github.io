<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teo Carballo | Network Engineer Profile</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #08111f;
    color: #d8e6f6;
    font-family: system-ui, sans-serif;
  }

  .loader {
    padding: 24px 28px;
    border: 1px solid rgba(115, 162, 209, 0.25);
    border-radius: 16px;
    background: rgba(13, 27, 46, 0.75);
    max-width: 560px;
    text-align: center;
  }

  .small {
    opacity: 0.75;
    font-size: 0.95rem;
  }
</style>
</head>
<body>
  <div class="loader">
    <h1>Cargando perfil...</h1>
    <p class="small">Si tarda demasiado, recarga la página en unos segundos.</p>
  </div>

  <script>
    (async () => {
      const parts = [
        "payload/v2/page.part01.b64",
        "payload/v2/page.part02.b64",
        "payload/v2/page.part03.b64",
        "payload/v2/page.part04.b64",
        "payload/v2/page.part05.b64",
        "payload/v2/page.part06.b64"
      ];

      const part02TailPatch = "sIDI1NSwgMC44MikpOwogICAgY29sb3I6ICMwNDEwMWM7CiAgfQoKICAubGFiLWFjdGlvbnMgewogICAgZGlzcGxheTogZmxleDsKICAgIGZsZXgtd3JhcDogd3JhcDsKICAgIGdhcDogMTBweDsKICAgIG1hcmdpbjogMThweCAwIDIycHg7CiAgfQoKICAubGFiLWNoZWNrbGlzdCB7CiAgICBkaXNwbGF5OiBncmlkOwogICAgZ2FwOiAxMHB4OwogICAgbWFyZ2luLXRvcDogMjBweDsKICB9CgogIC5jaGVjay1pdGVtIHsKICAgIGRpc3BsYXk6IGZsZXg7CiAgICBhbGlnbi1pdGVtczogY2VudGVyOwogICAgZ2FwOiAxMHB4OwogICAgY29sb3I6IHZhcigtLW11dGVkKTsKICAgIGZvbnQtZmFtaWx5OiAi";

      const desktopPatch = `
section[id] { scroll-margin-top: 118px; }
@media (min-width: 1081px) {
  .shell { max-width: 1320px !important; padding: 34px 36px 72px !important; }
  .topbar { gap: 24px !important; padding: 18px 24px !important; margin-bottom: 48px !important; }
  .nav { gap: 14px !important; }
  .nav a { padding: 10px 14px !important; }
  .hero { gap: 40px !important; margin-bottom: 56px !important; }
  .hero-main { padding: 46px !important; }
  .hero-side { padding: 34px !important; gap: 28px !important; }
  .meta-grid { gap: 22px !important; margin-bottom: 38px !important; }
  .meta-card, .card, .status-card, .cert-item, .edu-item, .info-item { padding: 24px !important; }
  .hero-actions { margin-bottom: 34px !important; }
  .layout { gap: 40px !important; }
  .stack { gap: 38px !important; }
  .section { padding: 40px !important; }
  .section-heading { margin-bottom: 32px !important; }
  .cards, .timeline, .cert-list, .edu-list, .info-list { gap: 22px !important; }
  .dashboard { gap: 16px !important; }
  .stat { padding: 24px 20px !important; }
  .cli { padding: 24px !important; }
  .cli-lab { gap: 24px !important; }
}
@media (hover: hover) and (pointer: fine) {
  .card, .timeline-item, .cert-item, .edu-item, .info-item, .status-card, .stat {
    transition: transform 180ms ease, border-color 180ms ease, background 180ms ease !important;
  }
  .card:hover, .timeline-item:hover, .cert-item:hover, .edu-item:hover, .info-item:hover, .status-card:hover, .stat:hover {
    transform: translateY(-3px);
    border-color: rgba(134, 224, 255, 0.28) !important;
    background: rgba(255, 255, 255, 0.035) !important;
  }
}`;

      const chunks = await Promise.all(
        parts.map((path) =>
          fetch(path, { cache: "no-store" }).then((response) => {
            if (!response.ok) throw new Error(`No se pudo cargar ${path}`);
            return response.text();
          })
        )
      );

      const normalized = chunks.map((chunk) => chunk.replace(/[^A-Za-z0-9+/=]/g, ""));

      if (normalized[1] && normalized[1].length === 11547) {
        normalized[1] += part02TailPatch;
      }

      let joined = normalized.join("");
      if (joined.length % 4 !== 0) {
        joined = joined.padEnd(joined.length + (4 - (joined.length % 4)), "=");
      }

      const binary = atob(joined);
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      let html = new TextDecoder("utf-8").decode(bytes);

      if (!/^<!doctype html>/i.test(html.trimStart())) {
        throw new Error("Payload decodificado inválido");
      }

      html = html.replace("<strong>Soporte</strong>", "<strong>L1/L2</strong>");
      html = html.replace("<span>Atención técnica y resolución</span>", "<span>Soporte técnico y resolución</span>");

      if (!html.includes("scroll-margin-top: 118px")) {
        html = html.replace("</style>", `${desktopPatch}\n</style>`);
      }

      document.open();
      document.write(html);
      document.close();
    })().catch(() => {
      document.body.innerHTML = '<div class="loader"><h1>Error al cargar la web</h1><p class="small">Haz una recarga fuerte con Ctrl+F5 dentro de unos segundos.</p></div>';
    });
  </script>
</body>
</html>
