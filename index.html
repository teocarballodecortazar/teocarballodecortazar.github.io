<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teo Carballo | Network Engineer Profile</title>
<style>
  :root {
    --bg: #08111f;
    --panel: rgba(10, 20, 35, 0.84);
    --line: rgba(115, 162, 209, 0.22);
    --text: #d8e6f6;
    --muted: #8ca4bf;
    --accent: #86e0ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    color: var(--text);
    font-family: system-ui, sans-serif;
    background:
      radial-gradient(circle at top right, rgba(76, 194, 255, 0.14), transparent 28%),
      radial-gradient(circle at bottom left, rgba(82, 214, 162, 0.08), transparent 24%),
      linear-gradient(180deg, #07111d 0%, #091422 50%, #07101c 100%);
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(97, 146, 194, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(97, 146, 194, 0.08) 1px, transparent 1px);
    background-size: 36px 36px;
    mask-image: linear-gradient(180deg, rgba(255, 255, 255, 0.55), transparent 90%);
    pointer-events: none;
  }
  .loader {
    position: relative;
    z-index: 1;
    width: min(100%, 560px);
    padding: 28px;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: var(--panel);
    box-shadow: 0 18px 70px rgba(0,0,0,.35);
  }
  h1 { margin: 0 0 10px; font-size: clamp(1.8rem, 4vw, 2.5rem); }
  p { margin: 0; color: var(--muted); line-height: 1.6; }
  .status { margin-top: 14px; color: var(--accent); font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: .95rem; }
</style>
</head>
<body>
  <div class="loader">
    <h1>Cargando perfil</h1>
    <p>Reconstruyendo la landing desde el repositorio. Si tarda demasiado, haz una recarga fuerte dentro de unos segundos.</p>
    <div id="status" class="status">Iniciando carga...</div>
  </div>
<script>
(async () => {
  const status = document.getElementById('status');
  const tailPatch = 'sIDI1NSwgMC44MikpOwogICAgY29sb3I6ICMwNDEwMWM7CiAgfQoKICAubGFiLWFjdGlvbnMgewogICAgZGlzcGxheTogZmxleDsKICAgIGZsZXgtd3JhcDogd3JhcDsKICAgIGdhcDogMTBweDsKICAgIG1hcmdpbjogMThweCAwIDIycHg7CiAgfQoKICAubGFiLWNoZWNrbGlzdCB7CiAgICBkaXNwbGF5OiBncmlkOwogICAgZ2FwOiAxMHB4OwogICAgbWFyZ2luLXRvcDogMjBweDsKICB9CgogIC5jaGVjay1pdGVtIHsKICAgIGRpc3BsYXk6IGZsZXg7CiAgICBhbGlnbi1pdGVtczogY2VudGVyOwogICAgZ2FwOiAxMHB4OwogICAgY29sb3I6IHZhcigtLW11dGVkKTsKICAgIGZvbnQtZmFtaWx5OiAi';
  const partUrls = Array.from({ length: 6 }, (_, i) => `payload/v2/page.part${String(i + 1).padStart(2, '0')}.b64?v=20260406-loaderfix`);
  const setStatus = (text) => { status.textContent = text; };
  const decodeBase64Utf8 = (b64) => {
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    return new TextDecoder().decode(bytes);
  };
  try {
    setStatus('Descargando bloques...');
    const chunks = await Promise.all(partUrls.map(async (url, index) => {
      const response = await fetch(url, { cache: 'no-store' });
      if (!response.ok) throw new Error(`chunk ${index + 1}`);
      let text = await response.text();
      text = text.replace(/[^A-Za-z0-9+/=]/g, '');
      if (index === 1 && text.length === 11547) text += tailPatch;
      return text;
    }));
    setStatus('Validando contenido...');
    let joined = chunks.join('');
    joined += '='.repeat((4 - (joined.length % 4)) % 4);
    const html = decodeBase64Utf8(joined);
    if (!html.includes('<div class="shell">') || !html.includes('Teo Carballo')) {
      throw new Error('decoded-html-invalid');
    }
    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    console.error(error);
    setStatus('Error al cargar la web. Prueba con Ctrl+F5 en 1 minuto.');
  }
})();
</script>
</body>
</html>
