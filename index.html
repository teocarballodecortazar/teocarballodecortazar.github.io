      const chunks = await Promise.all(

          fetch(path, { cache: "no-store" }).then((response) => {
            if (!response.ok) throw new Error(`No se pudo cargar ${path}`);
            return response.text();
          })
        )
      );

      const normalized = chunks.map((chunk) => chunk.replace(/[^A-Za-z0-9+/=]/g, ""));

      if (normalized[1] && normalized[1].length === 11547) {
        normalized[1] += part02TailPatch;
      }

      let joined = normalized.join("");
      if (joined.length % 4 !== 0) {
        joined = joined.padEnd(joined.length + (4 - (joined.length % 4)), "=");
      }

      const binary = atob(joined);
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      let html = new TextDecoder("utf-8").decode(bytes);

      if (!/^<!doctype html>/i.test(html.trimStart())) {
        throw new Error("Payload decodificado inv\u00e1lido");

      html = html.replace(
        /Objetivo: aportar valor[\s\S]*?operaci&oacute;n\./,
        'Objetivo: aportar valor en entornos IT donde la conectividad, la estabilidad de red, el soporte t&eacute;cnico y la administraci&oacute;n de sistemas tengan impacto real en la operaci&oacute;n.'
      );
      html = html.replace(
        /\s*<aside class="panel reveal">[\s\S]*?<\/aside>(\s*<\/section>)/,
        "$1"
      );
      if (!html.includes(".layout-wide")) {
        html = html.replace("</style>", `${wideSectionsPatch}\n</style>`);
      }
      const extractSection = (pattern) => {
        const match = html.match(pattern);
        return match ? match[0] : "";
      };
      const skillsSection = extractSection(/<section class="panel section reveal" id="skills">[\s\S]*?<\/section>/);
      const experienceSection = extractSection(/<section class="panel section reveal" id="experience">[\s\S]*?<\/section>/);
      const educationSection = extractSection(/<section class="panel section reveal" id="education">[\s\S]*?<\/section>/);
      const extraInfoSection = extractSection(/<section class="panel section reveal">\s*<div class="section-heading">\s*<h2>Perfil adicional<\/h2>[\s\S]*?<\/section>/);
      const contactSection = extractSection(/<section class="panel section reveal" id="contact">[\s\S]*?<\/section>/);
      if (skillsSection && experienceSection && educationSection && contactSection) {
        html = html.replace(
          /<div class="layout">[\s\S]*?<\/div>\s*<section class="panel section reveal playground" id="lab">/,
          `<div class="layout layout-wide">
      <main class="stack stack-wide">
        ${experienceSection}

${rebuiltCertsSection}

        ${educationSection}

        ${skillsSection}

        <div class="dual-panels">
          ${extraInfoSection}

          ${contactSection}
        </div>
      </main>
    </div>

    <section class="panel section reveal playground" id="lab">`
        );
      }
      html = html.replace(
        /\s*<section class="panel section reveal playground" id="lab">[\s\S]*?<\/section>/,
        ""
      );
      html = html.replace(
        /<div class="meta-value">Castellano[\s\S]*?English B2<\/div>/,
        '<div class="meta-value">Castellano &middot; Catal&aacute;n &middot; Ingl&eacute;s B2</div>'
      );
      html = html.replace('<span class="pill good">Multilingual</span>', '<span class="pill good">Idiomas</span>');
      html = html.replace(
        /Castellano nativo,[\s\S]*?English nivel B2\./,
        "Castellano y catal&aacute;n nativos, e ingl&eacute;s nivel B2."
      );

      if (!html.includes('href="#projects"')) {
        html = html.replace(
          `<a href="#experience">Experiencia</a>
        <a href="#certs">Certs</a>`,
          projectsNavPatch
        );
      }

      if (!html.includes('class="nav-toggle"')) {
        html = html.replace(
          /<nav class="nav">[\s\S]*?<\/nav>/,
          `<button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span class="nav-toggle-bars"><span></span><span></span><span></span></span>
        <span>Men&uacute;</span>
      </button>

      $&`.replace("$&", (html.match(/<nav class="nav">[\s\S]*?<\/nav>/) || [""])[0]).replace('<nav class="nav">', '<nav class="nav" id="site-nav">')
        );
      }

      if (!html.includes('id="projects"')) {
        html = html.replace(
          /(<section class="panel section reveal" id="experience">[\s\S]*?<\/section>)(\s*<\/main>)/,
          `$1\n\n${projectsSectionPatch}$2`
        );
      }

      if (!html.includes('const nav = document.getElementById("site-nav");')) {
        html = html.replace(
          'const navLinks = document.querySelectorAll(".nav a");',
          'const navLinks = document.querySelector(".nav a");\n    const nav = document.getElementById("site-nav");\n    const navToggle = document.querySelector(".nav-toggle");'
        );
      }

      if (!html.includes('function syncMobileNav()')) {
        html = html.replace(
          '    window.addEventListener("scroll", () => {',
          `    function syncMobileNav() {
      if (window.innerWidth > 760) {
        nav?.classList.remove("is-open");
        navToggle?.setAttribute("aria-expanded", "false");
      }
    }

    navToggle?.addEventListener("click", () => {
      const isOpen = nav?.classList.toggle("is-open");
      navToggle.setAttribute("aria-expanded", String(Boolean(isOpen)));
    });

    navLinks.forEach((link) => {
      link.addEventListener("click", () => {
        if (window.innerWidth <= 760) {
          nav?.classList.remove("is-open");
          navToggle?.setAttribute("aria-expanded", "false");
        }
      });
    });

    window.addEventListener("resize", syncMobileNav);
    syncMobileNav();

    window.addEventListener("scroll", () => {`
        );
      }

      document.open();
      document.write(html);
      document.close();
    })().catch(() => {
      document.body.innerHTML = '<div class="loader"><h1>Error al cargar la web</h1><p class="small">Haz una recarga fuerte con Ctrl+F5 dentro de unos segundos.</p></div>';
    });
  </script>
</body>
</html>
