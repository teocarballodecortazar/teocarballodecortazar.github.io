<!DOCTYPE html>

<title>Teo Carballo | Network Engineer Profile</title>

<style>
  :root {
    --bg: #08111f;
    --bg-soft: #0d1829;
    --panel: rgba(10, 20, 35, 0.84);
    --panel-strong: rgba(13, 27, 46, 0.96);
    --line: rgba(115, 162, 209, 0.2);
    --line-strong: rgba(120, 175, 232, 0.42);
    --text: #d8e6f6;
    --muted: #8ca4bf;
    --accent: #4cc2ff;
    --accent-strong: #86e0ff;
    --good: #52d6a2;
    --warn: #ffca6a;
    --title: #f3f7fb;
    --shadow: 0 18px 70px rgba(0, 0, 0, 0.35);
    --radius: 22px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  section[id] {
    scroll-margin-top: 118px;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at top right, rgba(76, 194, 255, 0.14), transparent 28%),
      radial-gradient(circle at bottom left, rgba(82, 214, 162, 0.08), transparent 24%),
      linear-gradient(180deg, #07111d 0%, #091422 50%, #07101c 100%);
    color: var(--text);
    font-family: "Space Grotesk", system-ui, sans-serif;
    line-height: 1.72;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(97, 146, 194, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(97, 146, 194, 0.08) 1px, transparent 1px);
    background-size: 36px 36px;
    mask-image: linear-gradient(180deg, rgba(255, 255, 255, 0.55), transparent 90%);
    pointer-events: none;
    z-index: 0;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  img {
    max-width: 100%;
    display: block;
  }

  .shell {
    position: relative;
    z-index: 1;
    max-width: 1240px;
    margin: 0 auto;
    padding: 28px 28px 56px;
  }

  .topbar {
    position: sticky;
    top: 16px;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: nowrap;
    gap: 18px;
    padding: 14px 18px;
    margin-bottom: 38px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(8, 16, 29, 0.72);
    backdrop-filter: blur(14px);
    box-shadow: var(--shadow);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .brand-copy {
    min-width: 0;
  }

  .brand-mark {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    border: 1px solid rgba(134, 224, 255, 0.28);
    background: linear-gradient(135deg, rgba(76, 194, 255, 0.18), rgba(82, 214, 162, 0.08));
    color: var(--accent-strong);
    font-family: "IBM Plex Mono", monospace;
    font-weight: 600;
  }

  .brand-copy strong {
    display: block;
    color: var(--title);
    font-size: 0.98rem;
  }

  .brand-copy span,
  .topbar-status,
  .nav a,
  .meta-label,
  .badge,
  .chip,
  .tag,
  .mini-label,
  .timeline-date,
  .cli-line,
  .footer {
    font-family: "IBM Plex Mono", monospace;
  }

  .brand-copy span {
    color: var(--muted);
    font-size: 0.78rem;
  }

  .nav {
    display: flex;
    flex: 1 1 auto;
    min-width: 0;
    flex-wrap: nowrap;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .nav a {
    padding: 9px 12px;
    border-radius: 10px;
    font-size: 0.76rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid transparent;
    transition: 160ms ease;
  }

  .nav a:hover,
  .nav a.active {
    color: var(--accent-strong);
    border-color: rgba(134, 224, 255, 0.22);
    background: rgba(76, 194, 255, 0.08);
  }

  .topbar-status" {
    display: flex;
    flex: 0 0 auto;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 0.76rem;
    white-space: nowrap;
  }

  .nav-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 44px;
    padding: 0 14px;
    border: 1px solid rgba(134, 224, 255, 0.22);
    border-radius: 12px;
    background: rgba(76, 194, 255, 0.08);
    color: var(--accent-strong);
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .nav-toggle-bars {
    display: inline-grid;
    gap: 4px;
  }

  .nav-toggle-bars span {
    display: block;
    width: 14px;
    height: 2px;
    border-radius: 999px;
    background: currentColor;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: var(--good);
    box-shadow: 0 0 14px rgba(82, 214, 162, 0.85);
  }

  .hero {
    display: grid;
    grid-template-columns: 1.25fr 0.85fr;
    gap: 32px;
    margin-bottom: 44px;
  }

  .panel {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.02);
  }

  .panel-title {
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.78rem;
    color: var(--accent-strong);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .panel-head .badge {
    color: var(--muted);
    font-size: 0.72rem;
  }

  .hero-main {
    padding: 38px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid rgba(76, 194, 255, 0.2);
    background: rgba(76, 194, 255, 0.08);
    color: var(--accent-strong);
    font-size: 0.76rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .eyebrow {
    margin-bottom: 18px;
  }

  .hero-intro {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: start;
    gap: 24px;
    margin-bottom: 20px;
  }

  .profile-shot-wrap {
    position: relative;
    width: 154px;
    flex-shrink: 0;
  }

  .profile-shot-wrap::before {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: 28px;
    border: 1px solid rgba(134, 224, 255, 0.18);
    background:
      linear-gradient(135deg, rgba(76, 194, 255, 0.12), rgba(82, 214, 162, 0.06)),
      rgba(255, 255, 255, 0.02);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
    z-index: 0;
  }

  .profile-shot-wrap::after {
    content: "PROFILE ID";
    position: absolute;
    right: 10px;
    bottom: -16px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(134, 224, 255, 0.22);
    background: rgba(7, 17, 29, 0.92);
    color: var(--accent-strong);
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.64rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    z-index: 2;
  }

  .profile-shot {
    position: relative;
    z-index: 1;
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 22px;
    border: 1px solid rgba(134, 224, 255, 0.24);
    filter: saturate(1.02) contrast(1.03);
  }

  .hero-copy {
    min-width: 0;
  }

  h1 {
    max-width: 12ch;
    font-size: clamp(2.8rem, 8vw, 5.7rem);
    line-height: 0.95;
    color: var(--title);
    letter-spacing: -0.04em;
    margin-bottom: 18px;
  }

  .lede {
    max-width: 60ch;
    color: var(--muted);
    font-size: 1.12rem;
    margin-bottom: 30px;
  }

  .highlight {
    color: var(--accent-strong);
  }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
    margin-bottom: 32px;
  }

  .meta-card {
    padding: 20px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.02);
  }

  .meta-label {
    display: block;
    margin-bottom: 6px;
    color: var(--muted);
    font-size: 0.74rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .meta-value {
    color: var(--title);
    font-size: 1rem;
    font-weight: 600;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 28px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 48px;
    padding: 0 18px;
    border-radius: 14px;
    border: 1px solid var(--line-strong);
    transition: 180ms ease;
    font-weight: 600;
  }

  .btn-primary {
    background: linear-gradient(135deg, rgba(76, 194, 255, 0.92), rgba(65, 157, 255, 0.82));
    color: #04101c;
    box-shadow: 0 14px 34px rgba(76, 194, 255, 0.2);
  }

  .btn-secondary {
    color: var(--title);
    background: rgba(255, 255, 255, 0.03);
  }

  .btn:huver {
    transform: translateY(-2px);
    border-color: rgba(134, 224, 255, 0.38);
  }

  .hero-note {
    color: var(--muted);
    font-size: 0.98rem;
  }

  .hero-side {
    padding: 28px;
    display: grid;
    gap: 22px;
  }

  .dashboard {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .stat {
    padding: 22px 18px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.025);
  }

  .stat strong {
    display: block;
    font-size: 2rem;
    color: var(--title);
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat span {
    color: var(--muted);
    font-size: 0.85rem;
  }

  .cli {
    padding: 22px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(5, 13, 23, 0.96), rgba(8, 16, 28, 0.92));
  }

  .cli-header {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .cli-header span {
    width: 11px;
    height: 11px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.18);
  }

  .cli-line {
    color: #bdd8f3;
    font-size: 0.84rem;
    margin-bottom: 10px;
  }

  .cli-line.prompt {
    color: var(--accent-strong);
  }

  .cli-line.output {
    color: var(--muted);
  }

  .cli-line.good {
    color: var(--good);
  }

  .status-card {
    padding: 20px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(76, 194, 255, 0.05);
  }

  .status-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .status-top strong {
    color: var(--title);
    font-size: 1rem;
  }

  .chip {
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(82, 214, 162, 0.24);
    color: var(--good);
    background: rgba(82, 214, 162, 0.08);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .status-card p {
    color: var(--muted);
    font-size: 0.92rem;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 0.72fr;
    gap: 32px;
  }

  .stack {
    display: grid;
    gap: 32px;
  }

  .section {
    padding: 34px;
  }

  .section-heading {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 16px;
    margin-bottom: 28px;
  }

  .section-heading h2 {
    color: var(--title);
    font-size: 1.35rem;
  }

  .section-heading p {
    display: none;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
  }

  .card {
    padding: 22px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.02);
  }

  .mini-label {
    display: inline-block;
    margin-bottom: 10px;
    color: var(--accent-strong);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card h3 {
    color: var(--title);
    font-size: 1.02rem;
    margin-bottom: 10px;
  }

  .card p {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 18px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid rgba(115, 162, 209, 0.24);
    color: var(--muted);
    font-size: 0.74rem;
    letter-spacing: 0.04em;
    background: rgba(255, 255, 255, 0.03);
  }

  .timeline {
    display: grid;
    gap: 18px;
  }

  .timeline-item {
    position: relative;
    padding: 24px 22px 24px 26px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.02);
  }

  .timeline-item::before {
    content: "";
    position: absolute;
    top: 24px;
    left: 0;
    width: 4px;
    height: calc(100% - 48px);
    border-radius: 999px;
    background: linear-gradient(180deg, var(--accent), rgba(76, 194, 255, 0));
  }

  .timeline-date {
    display: inline-block;
    color: var(--accent-strong);
    font-size: 0.74rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .timeline-item h3 {
    color: var(--title);
    font-size: 1.06rem;
    margin-bottom: 4px;
  }

  .timeline-role {
    color: var(--accent);
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 10px;
  }

  .timeline-item ul {
    padding-left: 18px;
    color: var(--muted);
    margin-top: 12px;
  }

  .timeline-item li + li {
    margin-top: 8px;
  }

  .cert-list,
  .edu-list,
  .info-list {
    display: grid;
    gap: 18px;
  }

  .cert-item,
  .edu-item,
  .info-item {
    padding: 20px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.02);
  }

  .cert-top,
  .info-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }

  .cert-item h3,
  .edu-item h3,
  .info-item h3 {
    color: var(--title);
    font-size: 1rem;
    margin-bottom: 6px;
  }

  .cert-item p,
  .edu-item p,
  .info-item p {
    color: var(--muted);
    font-size: 0.92rem;
  }

  .pill {
    padding: 6px 10px;
    border-radius: 999px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .pill.good {
    color: var(--good);
    background: rgba(82, 214, 162, 0.08);
    border: 1px solid rgba(82, 214, 162, 0.22);
  }

  .pill.warn {
    color: var(--warn);
    background: rgba(255, 202, 106, 0.09);
    border: 1px solid rgba(255, 202, 106, 0.22);
  }

  .progress {
    margin-top: 12px;
    height: 8px;
    border-radius: 999px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.06);
  }

  .progress span {
    display: block;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #74b7ff, #86e0ff);
  }

  .contact-list {
    display: grid;
    gap: 14px;
    margin-top: 10px;
  }

  .contact-link {
    display: flex;
    align-items: center;
    justify-content: space-be
